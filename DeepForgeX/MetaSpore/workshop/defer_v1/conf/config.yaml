# DEFER 训练配置

# 基础配置
app_name: "defer_dnn_v1"
experiment_name: "defer_v1"

# 数据路径
train_path_prefix: "/mnt/data/oss_dsp_algo/ivr/sample/ivr_sample_v7/parquet"

# 训练日期
train_start_date: 2026-02-11
train_end_date: 2026-02-17
validation_date: 2026-02-18

# 模型输出
model_out_base_path: "./output"

# 模型参数
model_type: "DeferDNN"
embedding_size: 16
dnn_hidden_units: [512, 256, 128]
use_wide: false
batch_norm: true
net_dropout: 0.3

# FTRL 优化器参数
ftrl_l1: 1.0
ftrl_l2: 120.0
ftrl_alpha: 0.5
ftrl_beta: 1.0
adam_learning_rate: 0.001

# 特征配置
combine_schema_path: "./conf/combine_schema"
wide_combine_schema_path: "./conf/combine_schema"

# DEFER 特有配置
# 窗口大小 (分钟) - 对齐原版 DEFER: win1=6h, win2=24h, win3=72h
# 但我们的数据 diff_hours 分布显示大部分转化在 24h 内
# 先用较短窗口测试: 15min, 30min, 60min
defer_windows: [15, 30, 60]  # 窗口大小 (分钟)
defer_delay_hours: 24         # 延迟判断窗口 (小时)
# 数据使用 diff_hours 字段表示延迟，不需要时间戳字段

# 也可以用更长的窗口 (对齐原版)
# defer_windows: [360, 1440, 4320]  # 6h, 24h, 72h (分钟)
# defer_delay_hours: 24

# Spark 配置
local_spark: true
worker_count: 4
server_count: 2
batch_size: 1024
worker_memory: "8G"
server_memory: "8G"
coordinator_memory: "4G"

# 其他
input_label_column_index: 0
movas_log_output_path: "./defer_train_log.txt"
