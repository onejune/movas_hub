# ============================================================================
# DEFER 实验: defer_loss_v1
# ============================================================================
# 测试 loss_func: defer_loss (14 维标签, SPM loss)
# 固定: model_type=WinAdaptDNN, windows=24/48/72h
# ============================================================================

# 基础配置
app_name: "defer_loss_v1"
experiment_name: "defer_loss_v1"

# 数据路径
train_path_prefix: "/mnt/data/oss_dsp_algo/ivr/sample/ivr_sample_v7/parquet"

# 训练日期 (1天训练+1天验证)
train_start_date: 2026-02-11
train_end_date: 2026-02-17
validation_date: 2026-02-18

# 模型输出
model_out_base_path: "./output"

# ============================================================================
# 实验变量
# ============================================================================
# 模型类型: WinAdaptDNN (固定)
model_type: "WinAdaptDNN"

# 损失函数: defer_loss (14 维标签, SPM loss)
loss_func: "defer_loss_v1"

# DEFER 时间窗口 (固定: 24/48/72h)
defer_windows: [24, 48, 72]
defer_delay_hours: 168  # 7 天归因窗口
# ============================================================================

# 模型参数
embedding_size: 8
dnn_hidden_units: [256, 256, 128]
use_wide: false
batch_norm: true
net_dropout: 0.5

# 优化器参数
ftrl_l1: 1.0
ftrl_l2: 120.0
ftrl_alpha: 0.5
ftrl_beta: 1.0
adam_learning_rate: 0.001

# 特征配置
combine_schema_path: "./conf/combine_schema"
wide_combine_schema_path: "./conf/combine_schema"

# Spark 配置
local_spark: true
worker_count: 8
server_count: 2
batch_size: 512
worker_memory: "8G"
server_memory: "8G"
coordinator_memory: "4G"

# 其他
input_label_column_index: 0
movas_log_output_path: "./log/defer_train_log.txt"
