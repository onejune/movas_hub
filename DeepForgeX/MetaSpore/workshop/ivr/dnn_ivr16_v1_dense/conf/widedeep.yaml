## spark session
app_name: 'dnn_ivr16_v1'
local: True
worker_count: 10
server_count: 2
batch_size: 256
worker_memory: '10G'
server_memory: '10G'
coordinator_memory: '10G'
local_spark: local

## datasets
train_path_prefix: /mnt/data/oss_dsp_algo/ivr/sample/ivr_sample_v16/parquet
train_start_date: 2026-02-01
train_end_date: 2026-03-02
validation_date: 2026-03-03
movas_log_output_path: ./log/movas.log

## model configurations
combine_schema_path: ./conf/combine_schema
wide_combine_schema_path: ./conf/combine_schema

model_in_path: null
model_out_base_path: ./output/
model_export_path: null
model_version: '0.1'
experiment_name: dnn_ruf2_v1
input_label_column_index: 113

## model hyper params
embedding_size: 8
net_dropout: 0.5
adam_learning_rate: 0.00001
ftrl_alpha: 0.005
ftrl_beta: 0.05
ftrl_l1: 1.0
ftrl_l2: 10.0
training_epoches: 1
shuffle_training_dataset: True
dnn_hidden_units: [512,256,64]
use_wide: False
model_type: WideDeepDense
loss_func: 'log_loss'

## dense features config
dense_features_path: ./conf/dense_features
dense_encoder_type: linear
dense_output_dim: 32
dense_batch_norm: True
dense_dropout: 0.0
