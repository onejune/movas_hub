# CTR Auto HyperOpt 特征配置
# 通过 YAML 文件配置特征，方便修改和版本管理

# 标签列
label_col: label

# 排除的列（不参与训练）
exclude_features:
  - req_hour
  - sample_bid_date
  - diff_hours

# 高基数特征阈值（出现次数少于此值的归为 OTHER）
high_cardinality_threshold: 50

# Embedding 维度
embed_dim: 16

# ============================================================
# 稀疏特征（类别型）- 共 249 个
# ============================================================
